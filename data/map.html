<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Leaflet Map</title>
    <style>
        html, body 
        {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            box-sizing: border-box;
        }
        #map 
        {
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }
      .leaflet-div-icon {
            background: white;
            border: 2px solid #0077ff;
            border-radius: 50%;
            width: 10px !important;
            height: 10px !important;
            margin-left: -5px !important;
            margin-top: -5px !important;

            cursor: move !important;

            display: block;
            text-align: center;

        .leaflet-bottom.leaflet-right {

            display: block;
            text-align: center;
            font-size: 14px;

    <!-- Leaflet stylesheets -->

    <script src="./leaflet/leaflet-src.js"></script>

    <script src="./leaflet/draw/src/ext/TouchEvents.js"></script>
    <script src="./leaflet/draw/src/Tooltip.js"></script>
    <script src="./leaflet/draw/src/ext/GeometryUtil.js"></script>
    <script src="./leaflet/draw/src/ext/LatLngUtil.js"></script>
    <script src="./leaflet/draw/src/ext/LineUtil.Intersect.js"></script>
    <script src="./leaflet/draw/src/ext/Polygon.Intersect.js"></script>
    <script src="./leaflet/draw/src/ext/Polyline.Intersect.js"></script>

    <script src="./leaflet/draw/src/draw/handler/Draw.SimpleShape.js"></script>

    <script src="./leaflet/draw/src/edit/handler/Edit.SimpleShape.js"></script>
    <script src="./leaflet/draw/src/edit/handler/Edit.Rectangle.js"></script>

    <script src="./leaflet/draw/src/Control.Draw.js"></script>
    <script src="./leaflet/draw/src/Toolbar.js"></script>
    <script src="./leaflet/draw/src/draw/DrawToolbar.js"></script>
    <script src="./leaflet/draw/src/edit/EditToolbar.js"></script>
    <script src="./leaflet/draw/src/edit/handler/EditToolbar.Edit.js"></script>
    <script src="./leaflet/draw/src/edit/handler/EditToolbar.Delete.js"></script>

    <script src="./leaflet/flatGeoBuf/flatgeobuf-geojson.min.js"></script>

    <script src="./leaflet/esri/esri-leaflet.js"></script>

<body>
    <div id="map" style="border: 1px solid #ccc"></div>
    <script>

        // Script variables
        const apiKey = "pk.eyJ1IjoiYm5vcmRncmVuIiwiYSI6ImNsZmxuMHowZzAzaTczeG80ZXR3a2ZnNHEifQ.kc7P57DJg8tyDMjjP7czuQ";

        const streetBaseLayer = L.tileLayer(`https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=${apiKey}`, {
            tileSize: 512,
            maxZoom: 18,
            zoomOffset: -1,
            id: 'mapbox/streets-v11'
        });

        const satelliteBaseLayer = L.tileLayer(`https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=${apiKey}`, {
            tileSize: 512,
            maxZoom: 18,
            zoomOffset: -1,
            id: 'mapbox/satellite-v9'
        });

        const topographicBaseLayer = L.tileLayer(
            `https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=${apiKey}`,
            {
                tileSize: 512,
                maxZoom: 18,
                zoomOffset: -1,
                id: 'mapbox/outdoors-v12'
            }
        );

        const usgsTopoBaseLayer = L.tileLayer(
            'https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}',
            {
                maxZoom: 20,
                attribution: 'USGS The National Map'
            }
        );

        const fsTopoBaseLayer = L.esri.Vector.vectorTileLayer(
            "https://tiles.arcgis.com/tiles/gGHDlz6USftL5Pau/arcgis/rest/services/FSBasemap_20240617/VectorTileServer"
        );

        const map = new L.Map('map', {
            preferCanvas: true,
            layers: [streetBaseLayer],
            center: new L.LatLng(43.62455, -113.2971),
            zoom: 8
        });
        
        const boundingBoxLayer = new L.FeatureGroup();
        const demLayer = new L.FeatureGroup();
        const rectangleDrawer = new L.Draw.Rectangle(map);
        const centerControl = L.control({ position: 'topleft' });

        const windninjaLegendToggle = L.layerGroup([]);
        const windninjaTimeSeriesToggle = L.layerGroup([]);
        let windninjaTimeSeriesEnabled = false;
        let windninjaLegendEnabled = false;
        let activeWindNinjaLayer = null;
        let activeWindNinjaTimeSeriesImg = null;
        let activeWindNinjaTimeSeriesUrl = null;

        const initializationLegendToggle = L.layerGroup([]);
        const initializationTimeSeriesToggle = L.layerGroup([]);
        let initializationTimeSeriesEnabled = false;
        let initializationLegendEnabled = false;
        let activeInitializationLayer = null;
        let activeInitializationTimeSeriesImg = null;
        let activeInitializationTimeSeriesUrl = null;

        let lastActiveLayer = null;

        const timeSeriesContainer = document.createElement('div');
        timeSeriesContainer.style.cssText = `
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-start;
            z-index: 400;
        `;

        map.whenReady(() => {
            map.getContainer().appendChild(timeSeriesContainer);
        });        

        const legendContainer = document.createElement('div');
        legendContainer.style.cssText = `
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
            z-index: 400;
        `;

        map.whenReady(() => {
            map.getContainer().appendChild(legendContainer);
        });

        const baseTree = {
            label: 'Base Maps',
            children: [
                { label: 'Streets', layer: streetBaseLayer },
                { label: 'Satellite', layer: satelliteBaseLayer },
                { label: 'Topographic', layer: topographicBaseLayer },
                { label: 'USGS Topographic', layer: usgsTopoBaseLayer },
                { label: 'Forest Service Topographic', layer: fsTopoBaseLayer }
            ]
        };

        const windninjaOutputTree = {
            label: 'Simulation Output',
            children: [
                { label: 'No Output', layer: L.layerGroup([]), radioGroup: 'windninjaOutput'}
            ]
        };

        const initializationOutputTree = {
            label: 'Weather Model Output',
            children: [
                { label: 'No Output', layer: L.layerGroup([]),  radioGroup: 'initializationOutput' }
            ]
        };

        const stationOutputTree = {
            label: 'Weather Stations',
            children: [
                { label: 'No Output', layer: L.layerGroup([]),  radioGroup: 'stationOutput' }
            ]
        };

        const unknownOutputTree = {
            label: 'Unknown Output',
            children: [
                { label: 'No Output', layer: L.layerGroup([]), radioGroup: 'unknownOutput' }
            ]
        };

        const overlayTree = {
            label: 'WindNinja Overlays',
            children: []
        };

        const layerControl = L.control.layers.tree(
            baseTree,
            [],
            { collapsed: true }
        ).addTo(map);


        let drawDEMCheck = false;
        let centerControlAdded = false;
        let clearControlAdded = false;

        // Script functions
        function sendBoundingBox(layer) {
            const bounds = layer.getBounds();
            const bboxData = {
                north: bounds.getNorth(),
                south: bounds.getSouth(),
                east: bounds.getEast(),
                west: bounds.getWest()
            };

            if (window.bridge?.receiveBoundingBox) {
                window.bridge.receiveBoundingBox(JSON.stringify(bboxData));
            }
        }

        function drawBoundingBox(north, south, east, west) {
            clearBoundingBoxLayer();
            const bounds = [[south, west], [north, east]];
            const rectangle = L.rectangle(bounds).addTo(boundingBoxLayer);
            rectangle.editing.enable();
            map.fitBounds(rectangle.getBounds());
            rectangle.on('edit', () => {
                    sendBoundingBox(rectangle);
                    map.fitBounds(rectangle.getBounds()); 
            });
            updateCenterControl();
            updateClearControl();
        }

        function drawDEM(DEMCorners) {
            clearDEMLayer();

            const rectangleCorners = [
                [DEMCorners[1], DEMCorners[0]], // NE
                [DEMCorners[3], DEMCorners[2]], // SE
                [DEMCorners[5], DEMCorners[4]], // SW
                [DEMCorners[7], DEMCorners[6]], // NW
                [DEMCorners[1], DEMCorners[0]]  // NE
            ];

            const rectangle = L.polygon(rectangleCorners, {
                color: 'black',
                weight: 2,
                fill: false
            }).addTo(demLayer);

            setTimeout(() => {
                map.fitBounds(rectangle.getBounds());
            }, 10);

            updateCenterControl();
            updateOverlayTree();
        }

        function startRectangleDrawing() {
            clearBoundingBoxLayer();
            rectangleDrawer.enable();
        }

        function stopRectangleDrawing() {
            clearBoundingBoxLayer();            
            rectangleDrawer.disable();
        }

        map.on('draw:created', ({ layer }) => {
            clearBoundingBoxLayer();
            boundingBoxLayer.addLayer(layer);
            layer.editing.enable();
            sendBoundingBox(layer);
            layer.on('edit', () => 
            {
                sendBoundingBox(layer);
                map.fitBounds(layer.getBounds());
            });
            map.fitBounds(layer.getBounds());
            updateClearControl();
            updateCenterControl();
        });

        function hasCenterableItems() {
            return (
                boundingBoxLayer.getLayers().length > 0 ||
                demLayer.getLayers().length > 0 ||
                (lastActiveLayer && map.hasLayer(lastActiveLayer))
            );
        }

        function updateCenterControl() {
            const shouldShow = hasCenterableItems();

            if (shouldShow && !centerControlAdded) {
                centerControl.addTo(map);
                centerControlAdded = true;
            } else if (!shouldShow && centerControlAdded) {
                map.removeControl(centerControl);
                centerControlAdded = false;
            }
        }

        centerControl.onAdd = function(map) {
            const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-center');
            const button = L.DomUtil.create('a', 'leaflet-center-button', container);
            button.innerHTML = '⌖';
            button.title = 'Center on current layer';
            button.href = '#';

            L.DomEvent.on(button, 'click', (e) => {
                L.DomEvent.stopPropagation(e);
                L.DomEvent.preventDefault(e);

                centerMapOnActiveLayer();
            });

            return container;
        };

        const clearControl = L.control({ position: 'topright' });

        function hasClearableItems() {
            return (
                boundingBoxLayer.getLayers().length > 0 ||
                demLayer.getLayers().length > 0 ||
                windninjaOutputTree.children.length > 1 ||
                initializationOutputTree.children.length > 1 ||
                stationOutputTree.children.length > 1 ||
                unknownOutputTree.children.length > 1
            );
        }

        function updateClearControl() {
            const shouldShow = hasClearableItems();

            if (shouldShow && !clearControlAdded) {
                clearControl.addTo(map);
                clearControlAdded = true;
            } else if (!shouldShow && clearControlAdded) {
                map.removeControl(clearControl);
                clearControlAdded = false;
            }
        }

        clearControl.onAdd = function () {
            const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');

            const button = L.DomUtil.create('a', 'leaflet-control-clear', container);
            button.innerHTML = 'Clear';
            button.title = 'Clear all layers';
            button.href = '#';

            L.DomEvent.on(button, 'click', (e) => {
                L.DomEvent.stopPropagation(e);
                L.DomEvent.preventDefault(e);

                clearBoundingBoxLayer();
                clearWindNinjaOutputTree();
                clearInitializationOutputTree();
                clearStationOutputTree();
                clearUnknownOutputTree();
                clearTimeSeriesContainer();


                activeWindNinjaLayer = null;
                activeInitializationLayer = null;
                activeWindNinjaTimeSeriesImg = null;
                activeInitializationTimeSeriesImg = null;
            });

            return container;
        };

        function centerMapOnActiveLayer() {
            let bounds = null;

            if (boundingBoxLayer.getLayers().length > 0) {
                bounds = boundingBoxLayer.getLayers()[0].getBounds();
            }
            else if (lastActiveLayer && map.hasLayer(lastActiveLayer)) {
                bounds = lastActiveLayer.getBounds();
            }
            else if (demLayer.getLayers().length > 0) {
                bounds = demLayer.getLayers()[0].getBounds();
            }

            if (bounds) {
                map.fitBounds(bounds);
            }
        }

        let fgbTimeSeriesImgTimeSeriesImg = null;
        let fgbTimeSeriesImgTimeSeriesImgUrl = null;
        let pendingFiles = 0;

        function finishFileLoad() {
            pendingFiles--;

            if (pendingFiles === 0) {

                const windninjaLayers = windninjaOutputTree.children.filter(
                    x => x.label !== 'No Output'
                );

                if (windninjaLayers.length > 0) {
                    windninjaLayers.forEach(item => {
                        map.removeLayer(item.layer);
                    });

                    const firstLayer = windninjaLayers[0];
                    map.addLayer(firstLayer.layer);
                }

                const initializationLayers = initializationOutputTree.children.filter(
                    x => x.label !== 'No Output'
                );

                if (initializationLayers.length > 0) {
                    initializationLayers.forEach(item => {
                        map.removeLayer(item.layer);
                    });

                    const firstLayer = initializationLayers[0];
                    map.addLayer(firstLayer.layer);
                }

                centerMapOnActiveLayer(); 

                if (window.bridge?.receiveBoundingBox) {
                    window.bridge.mapLayersLoadingFinished();
                }
            }
        }

        let activeWindNinjaLegendCard = null;
        let activeInitializationLegendCard = null;

        async function loadSimulation(data, fileName) {
            pendingFiles++;

            if (fgbTimeSeriesImgTimeSeriesImg) {
                fgbTimeSeriesImgTimeSeriesImg.remove();
                fgbTimeSeriesImgTimeSeriesImg = null;
            }
            if (fgbTimeSeriesImgTimeSeriesImgUrl) {
                URL.revokeObjectURL(fgbTimeSeriesImgTimeSeriesImgUrl);
                fgbTimeSeriesImgTimeSeriesImgUrl = null;
            }

            const handled = await handleKml(data, fileName);
            if (handled) {
                finishFileLoad();   
                return; 
            }

            const arrayBuffer = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', data, true);
                xhr.responseType = 'arraybuffer';

                xhr.onload = function() {
                    if (xhr.status === 200 || xhr.status === 0) {
                        resolve(xhr.response);
                    } else {
                        reject(new Error(`Failed to load file: ${xhr.statusText}`));
                    }
                };

                xhr.onerror = function() {
                    reject(new Error("Network error occurred while reading local file."));
                };

                xhr.send();
            });
            const zip = await JSZip.loadAsync(arrayBuffer);

            const keywords = ["NOMADS", "UCAR", "PASTCAST"];
            const containsKeyword = Object.keys(zip.files).some(fileName => 
                keywords.some(keyword => fileName.toUpperCase().includes(keyword))
            );

            if (containsKeyword) {
                loadWxModel(data, fileName);
                return; 
            }

            const fgbEntry = Object.values(zip.files).filter(entry =>
                entry.name.toLowerCase().endsWith('.fgb')
            );
            const legendEntries = Object.values(zip.files).filter(entry =>
                entry.name.toLowerCase().endsWith('.bmp')
            );

            if (fgbEntry.length === 0) {
                console.error('No FlatGeoBuf files found in this KMZ.');
                return;
            }

            const fgb = fgbEntry[0];

            const features = [];

            const fgbBuffer = await fgb.async('arraybuffer');

            for await (const feature of flatgeobuf.deserialize(
                new Uint8Array(fgbBuffer)
            )) {
                if (feature?.geometry) {
                    features.push(feature);
                }
            }

                if (features.length === 0) {
                    console.error('No features found in FlatGeoBuf.');
                    return false;
                }

            const geoJsonLayer = L.geoJSON(features, {

                style: function(feature) {

                    const props = feature.properties || {};
                    const ogr = parseOGRStyle(props.OGR_STYLE);

                    return {
                        color: ogr.color || props.stroke || '#ffffff',
                        weight: ogr.weight || props["stroke-width"] || 1.0,
                        opacity: props["stroke-opacity"] ?? 1.0
                    };
                },

                onEachFeature: function(feature, layer) {
                    const props = feature.properties || {};
                    const name = props.name || "no name";

                    layer.bindPopup(`
                        <strong>${name}</strong><br>
                        Speed: ${props.speed ?? 'n/a'}<br>
                        Direction: ${props.dir ?? 'n/a'}
                    `);
                }
            });

            const layerGroup = L.layerGroup([geoJsonLayer]);

            const fgbLegendLayer = L.layerGroup([layerGroup]);
            const layerName = fileName;

            let timeSeriesImg = null;
            let timeSeriesImgUrl = null;

            const blob = await legendEntries[0].async('blob');

            if (activeWindNinjaLayer === fgbLegendLayer) {
                showWindNinjaLegend(blob);
            }

            const hasLegend = legendEntries.length > 0;
            const hasTimeSeries = legendEntries.length > 1;
            fgbLegendLayer._hasLegend = hasLegend;
            fgbLegendLayer._hasTimeSeries = hasTimeSeries;

            if (legendEntries.length > 1) {
                (async () => {
                    const blob = await legendEntries[1].async('blob');
                    timeSeriesImgUrl = URL.createObjectURL(blob);

                    timeSeriesImg = new Image();
                    timeSeriesImg.src = timeSeriesImgUrl;
                    timeSeriesImg.style.cssText = `
                        max-width: 500px;
                        height: auto;
                        pointer-events: auto;
                    `;

                    timeSeriesImg.onload = () => {

                        if (windninjaTimeSeriesEnabled && activeWindNinjaLayer === fgbLegendLayer) {

                            if (activeWindNinjaTimeSeriesImg) {
                                activeWindNinjaTimeSeriesImg.remove();
                                activeWindNinjaTimeSeriesImg = null;
                            }
                            showWindNinjaTimeSeries(timeSeriesImg);
                        }
                    };
                })();
            }

            fgbLegendLayer.on('add', () => {
                activeWindNinjaLayer = fgbLegendLayer;
                lastActiveLayer = geoJsonLayer;

                if (activeWindNinjaLegendCard) {
                    activeWindNinjaLegendCard.remove();
                    activeWindNinjaLegendCard = null;
                }

                if (fgbLegendLayer._hasLegend && windninjaLegendEnabled && legendEntries.length > 0) {
                    legendEntries[0].async('blob').then(blob => showWindNinjaLegend(blob));
                }

                if (windninjaTimeSeriesEnabled) {
                    if (timeSeriesImg) {
                        showWindNinjaTimeSeries(timeSeriesImg);
                    } 
                    else if (activeWindNinjaTimeSeriesImg) {
                        activeWindNinjaTimeSeriesImg.remove();
                        activeWindNinjaTimeSeriesImg = null;
                    }
                }
                updateOverlayTree();
            });

            fgbLegendLayer.on('remove', () => {

                if (activeWindNinjaLayer === fgbLegendLayer) {
                    activeWindNinjaLayer = null;
                }

                if (activeWindNinjaLegendCard) {
                    activeWindNinjaLegendCard.remove();
                    activeWindNinjaLegendCard = null;
                }

                if (!windninjaTimeSeriesEnabled && timeSeriesImg) {
                    timeSeriesImg.remove();
                    activeWindNinjaTimeSeriesImg = null;
                }
            });

            windninjaOutputTree.children.push({ label: layerName, layer: fgbLegendLayer, radioGroup: 'windninjaOutput'});

            windninjaOutputTree.children.sort((a, b) => {
                if (a.label === 'No Output') return 1;
                if (b.label === 'No Output') return -1;
                return a.label.localeCompare(b.label);
            });

            updateOverlayTree();

            if (!map.hasLayer(windninjaLegendToggle)) {
                map.addLayer(windninjaLegendToggle);
            }
            if (!map.hasLayer(windninjaTimeSeriesToggle)) {
                map.addLayer(windninjaTimeSeriesToggle);
            }

            windninjaLegendEnabled = true;
            windninjaTimeSeriesEnabled = true;
            
            finishFileLoad();
            updateCenterControl();
        }

        function parseOGRStyle(styleString) {
            if (!styleString) {
                return {};
            }

            const style = {};

            // Extract color
            const colorMatch = styleString.match(/c:\s*(#[0-9A-Fa-f]+)/);

            if (colorMatch) {
                style.color = colorMatch[1];
            }

            // Extract width
            const widthMatch = styleString.match(/w:\s*([\d.]+)px/);

            if (widthMatch) {
                style.weight = parseFloat(widthMatch[1]);
            }

            return style;
        }

        async function handleKml(data, fileName) {
            const kmlText = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', data, true);
                xhr.responseType = 'text'; // Expecting text instead of an arraybuffer

                xhr.onload = function() {
                    if (xhr.status === 200 || xhr.status === 0) {
                        resolve(xhr.responseText);
                    } else {
                        reject(new Error(`Status: ${xhr.status}`));
                    }
                };

                xhr.onerror = () => reject(new Error("XHR Error loading KML"));
                xhr.send();
            });
            const trimmed = kmlText.trim();
            if (!trimmed.startsWith('<')) {
                return false;
            }

            const parser = new DOMParser();
            const kmlDoc = parser.parseFromString(trimmed, 'text/xml');

            let layerName = fileName;

            const descriptionTag = kmlDoc.getElementsByTagName('description')[0];
            const isStationOutput =
                descriptionTag &&
                descriptionTag.textContent.includes('Weather Stations:');

            const kmlLayer = new L.KML(kmlDoc);
            const kmlLegendLayer = L.layerGroup([kmlLayer]);

            if (isStationOutput) {
                if (!layerName.toLowerCase().endsWith('.kml')) {
                    layerName += '.kml';
                }

                stationOutputTree.children.push({
                    label: layerName,
                    layer: kmlLegendLayer,
                    radioGroup: 'stationOutput'
                });

                stationOutputTree.children.sort((a, b) => {
                    if (a.label === 'No Output') return -1;
                    if (b.label === 'No Output') return 1;
                    return a.label.localeCompare(b.label);
                });

            } else {
                if (!layerName.toLowerCase().endsWith('.kml')) {
                    layerName += '.kml';
                }

                unknownOutputTree.children.push({
                    label: layerName,
                    layer: kmlLegendLayer,
                    radioGroup: 'unknownOutput'
                });

                // Keep only the newest unknown layer visible
                if (unknownOutputTree.children.length > 1) {
                    unknownOutputTree.children.forEach(item => {
                        if (item.layer && item.layer !== kmlLegendLayer) {
                            map.removeLayer(item.layer);
                        }
                    });
                }
            }

            updateOverlayTree();

            map.addLayer(kmlLegendLayer);

            lastActiveLayer = kmlLegendLayer;

            updateCenterControl();
            updateClearControl();

            return true;
        }

        async function loadWxModel(data, fileName) {
            const arrayBuffer = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', data, true);
                xhr.responseType = 'arraybuffer';

                xhr.onload = function() {
                    if (xhr.status === 200 || xhr.status === 0) {
                        resolve(xhr.response);
                    } else {
                        reject(new Error(`Failed to load file: ${xhr.statusText}`));
                    }
                };

                xhr.onerror = function() {
                    reject(new Error("Network error occurred while reading local file."));
                };

                xhr.send();
            });
            const zip = await JSZip.loadAsync(arrayBuffer);
            const fgbEntry = Object.values(zip.files).filter(entry =>
                entry.name.toLowerCase().endsWith('.fgb')
            );
            const legendEntries = Object.values(zip.files).filter(entry =>
                entry.name.toLowerCase().endsWith('.bmp')
            );

            if (fgbEntry.length === 0) {
                console.error('No FlatGeoBuf files found in this output.');
                return;
            }

        const fgb = fgbEntry[0];

            const features = [];

            const fgbBuffer = await fgb.async('arraybuffer');

            for await (const feature of flatgeobuf.deserialize(
                new Uint8Array(fgbBuffer)
            )) {
                if (feature?.geometry) {
                    features.push(feature);
                }
            }

                if (features.length === 0) {
                    console.error('No features found in FlatGeoBuf.');
                    return false;
                }

            const geoJsonLayer = L.geoJSON(features, {

                style: function(feature) {

                    const props = feature.properties || {};
                    const ogr = parseOGRStyle(props.OGR_STYLE);

                    return {
                        color: ogr.color || props.stroke || '#ffffff',
                        weight: ogr.weight || props["stroke-width"] || 1.0,
                        opacity: props["stroke-opacity"] ?? 1.0
                    };
                },

                onEachFeature: function(feature, layer) {
                    const props = feature.properties || {};
                    const name = props.name || "no name";

                    layer.bindPopup(`
                        <strong>${name}</strong><br>
                        Speed: ${props.speed ?? 'n/a'}<br>
                        Direction: ${props.dir ?? 'n/a'}
                    `);
                }
            });


            const layerGroup = L.layerGroup([geoJsonLayer]);

            const fgbLegendLayer = L.layerGroup([layerGroup]);
            const layerName = fileName;

            let timeSeriesImg = null;
            let timeSeriesImgUrl = null;

            const blob = await legendEntries[0].async('blob');

            if (activeInitializationLayer === fgbLegendLayer) {
                showInitializationLegend(blob);
            }
            
            if (legendEntries.length > 1) 
            {
                (async () => {

                    const blob = await legendEntries[1].async('blob');
                    timeSeriesImgUrl = URL.createObjectURL(blob);

                    timeSeriesImg = new Image();
                    timeSeriesImg.src = timeSeriesImgUrl;
                    timeSeriesImg.style.cssText = `
                        max-width: 500px;
                        height: auto;
                        pointer-events: auto;
                    `;

                    timeSeriesImg.onload = () => {

                        if (initializationTimeSeriesEnabled && activeInitializationLayer === fgbLegendLayer) {

                            if (activeInitializationTimeSeriesImg) {
                                activeInitializationTimeSeriesImg.remove();
                                activeInitializationTimeSeriesImg = null;
                            }
                            showInitializationTimeSeries(timeSeriesImg);
                        }
                    };

                })();
            }
         
            fgbLegendLayer.on('add', () => {
                activeInitializationLayer = fgbLegendLayer;
                lastActiveLayer = geoJsonLayer;

                if (activeInitializationLegendCard) {
                    activeInitializationLegendCard.remove();
                    activeInitializationLegendCard = null;
                }

                if (initializationLegendEnabled) {
                    legendEntries[0].async('blob').then(blob => showInitializationLegend(blob));
                }

                if (initializationTimeSeriesEnabled && timeSeriesImg) {
                    showInitializationTimeSeries(timeSeriesImg);
                }
                
                updateOverlayTree();
            });

            fgbLegendLayer.on('remove', () => {

                if (activeInitializationLayer === fgbLegendLayer) {
                    activeInitializationLayer = null;
                }

                if (activeInitializationLegendCard) {
                    activeInitializationLegendCard.remove();
                    activeInitializationLegendCard = null;
                }

                if (!initializationTimeSeriesEnabled && timeSeriesImg) {
                    timeSeriesImg.remove();
                    showInitializationTimeSeriesImg = null;
                }
            });

            initializationOutputTree.children.push({ label: layerName, layer: fgbLegendLayer, radioGroup: 'initializationOutput'});

            initializationOutputTree.children.sort((a, b) => {
                if (a.label === 'No Output') return 1;
                if (b.label === 'No Output') return -1;
                return a.label.localeCompare(b.label);
            });

            updateOverlayTree();

            if (!map.hasLayer(initializationLegendToggle)) {
                map.addLayer(initializationLegendToggle);
            }
            if (!map.hasLayer(initializationTimeSeriesToggle)) {
                map.addLayer(initializationTimeSeriesToggle);
            }

            initializationLegendEnabled = true;
            initializationTimeSeriesEnabled = true;

            finishFileLoad();
            updateCenterControl();
            updateClearControl();
        }

        function showWindNinjaLegend(blob) {
            if (!windninjaLegendEnabled) return;

            if (activeWindNinjaLegendCard) {
                activeWindNinjaLegendCard.remove();
                activeWindNinjaLegendCard = null;
            }

            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.src = url;
            img.onload = () => URL.revokeObjectURL(url);

            const card = createLegendCard(img, 'Simulation Legend', 2); // bottom
            legendContainer.appendChild(card);

            activeWindNinjaLegendCard = card;
        }

        function showInitializationLegend(blob) {
            if (!initializationLegendEnabled) return;

            if (activeInitializationLegendCard) {
                activeInitializationLegendCard.remove();
                activeInitializationLegendCard = null;
            }

            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.src = url;
            img.onload = () => URL.revokeObjectURL(url);

            const card = createLegendCard(img, 'Weather Model Legend', 1); // top
            legendContainer.appendChild(card);

            activeInitializationLegendCard = card;
        }

        function clearWindNinjaOutputTree() 
        {
            clearTimeSeriesContainer();
            windninjaOutputTree.children.forEach(item => {
                if (item.layer && item.label !== 'No Output') {
                    map.removeLayer(item.layer);
                }
            });

            windninjaOutputTree.children = [{
                label: 'No Output',
                layer: L.layerGroup([]),
                radioGroup: 'windninjaOutput'
            }];

            updateOverlayTree();
            updateCenterControl();
            updateClearControl();
        }

        function clearInitializationOutputTree() 
        {
            clearTimeSeriesContainer();
            initializationOutputTree.children.forEach(item => {
                if (item.layer && item.label !== 'No Output') {
                    map.removeLayer(item.layer);
                }
            });

            initializationOutputTree.children = [{
                label: 'No Output',
                layer: L.layerGroup([]),
                radioGroup: 'initializationOutput'
            }];

            updateOverlayTree();
            updateCenterControl();
            updateClearControl();
        }

        function clearStationOutputTree() 
        {
            stationOutputTree.children.forEach(item => {
                if (item.layer && item.label !== 'No Output') {
                    map.removeLayer(item.layer);
                }
            });

            stationOutputTree.children = [{
                label: 'No Stations',
                layer: L.layerGroup([]),
                radioGroup: 'stationOutput'
            }];

            updateOverlayTree();
            updateCenterControl();
            updateClearControl();
        }

        function clearUnknownOutputTree() 
        {
            unknownOutputTree.children.forEach(item => {
                if (item.layer && item.label !== 'No Output') {
                    map.removeLayer(item.layer);
                }
            });

            unknownOutputTree.children = [{
                label: 'No Output',
                layer: L.layerGroup([]),
                radioGroup: 'unknownOutput'
            }];

            updateOverlayTree();
            updateCenterControl();
            updateClearControl();
        }

        function clearBoundingBoxLayer() 
        {
            boundingBoxLayer.eachLayer(layer => {
                if (layer.editing) layer.editing.disable();
            });
            boundingBoxLayer.clearLayers();

            updateCenterControl();
            updateClearControl();
        }

        function clearDEMLayer() {
            demLayer.clearLayers();
        }

        function updateOverlayTree() 
        {
            if (!layerControl || !layerControl.setOverlayTree) return;

            const displayTree = [];
            const overlayChildren = [];

            if (boundingBoxLayer.getLayers().length > 0) {
                overlayChildren.push({
                    label: 'Bounding Box',
                    layer: boundingBoxLayer
                });
            }

            if (demLayer.getLayers().length > 0) {
                overlayChildren.push({
                    label: 'Elevation File Outline',
                    layer: demLayer
                });
            }

            if (activeWindNinjaLayer) {

                if (activeWindNinjaLayer._hasLegend) {
                    overlayChildren.push({
                        label: 'Simulation Legend',
                        layer: windninjaLegendToggle
                    });
                }

                if (activeWindNinjaLayer._hasTimeSeries) {
                    overlayChildren.push({
                        label: 'Simulation Datetime',
                        layer: windninjaTimeSeriesToggle
                    });
                }
            }

            if (activeInitializationLayer) {
                overlayChildren.push({
                    label: 'Weather Model Legend',
                    layer: initializationLegendToggle
                });

                overlayChildren.push({
                    label: 'Weather Model Datetime',
                    layer: initializationTimeSeriesToggle
                });
            }

            if (windninjaOutputTree.children.length > 1)
                displayTree.push(windninjaOutputTree);

            if (initializationOutputTree.children.length > 1)
                displayTree.push(initializationOutputTree);

            if (stationOutputTree.children.length > 1)
                displayTree.push(stationOutputTree);

            if (unknownOutputTree.children.length > 1)
                displayTree.push(unknownOutputTree);

            if (overlayChildren.length > 0) {
                displayTree.push({
                    label: 'WindNinja Overlays',
                    children: overlayChildren
                });
            }

            layerControl.setOverlayTree(displayTree);
        }

        map.on('overlayadd', e => {

            if (e.layer === windninjaLegendToggle) {
                windninjaLegendEnabled = true;
                if (activeWindNinjaLayer) activeWindNinjaLayer.fire('add');
            }
            if (e.layer === initializationLegendToggle) {
                initializationLegendEnabled = true;
                if (activeInitializationLayer) activeInitializationLayer.fire('add');
            }

            if (e.layer === windninjaTimeSeriesToggle) {
                windninjaTimeSeriesEnabled = true;
                if (activeWindNinjaLayer) activeWindNinjaLayer.fire('add');
            }
            if (e.layer === initializationTimeSeriesToggle) {
                initializationTimeSeriesEnabled = true;
                if (activeInitializationLayer) activeInitializationLayer.fire('add');
            }

            if (e.layer === windninjaOutputTree.children[0]?.layer) {
                if (activeWindNinjaTimeSeriesImg) {
                    activeWindNinjaTimeSeriesImg.remove();
                    activeWindNinjaTimeSeriesImg = null;
                }
                activeWindNinjaLayer = null;
                updateOverlayTree();
            }
            if (e.layer === initializationOutputTree.children[0]?.layer) {
                if (activeInitializationTimeSeriesImg) {
                    activeInitializationTimeSeriesImg.remove();
                    activeInitializationTimeSeriesImg = null;
                }
                activeInitializationLayer = null;
                updateOverlayTree();
            }
        });

        map.on('overlayremove', e => {

            if (e.layer === windninjaLegendToggle) {
                windninjaLegendEnabled = false;
                if (activeWindNinjaLegendCard) {
                    activeWindNinjaLegendCard.remove();
                    activeWindNinjaLegendCard = null;
                }            
            }
            if (e.layer === initializationLegendToggle) {
                initializationLegendEnabled = false;
                if (activeInitializationLegendCard) {
                    activeInitializationLegendCard.remove();
                    activeInitializationLegendCard = null;
                }
            }

            if (e.layer === windninjaTimeSeriesToggle) {
                windninjaTimeSeriesEnabled = false;
                if (activeWindNinjaTimeSeriesImg) {
                    activeWindNinjaTimeSeriesImg.remove();
                    activeWindNinjaTimeSeriesImg = null;
                }
            }
            if (e.layer === initializationTimeSeriesToggle) {
                initializationTimeSeriesEnabled = false;
                if (activeInitializationTimeSeriesImg) {
                    activeInitializationTimeSeriesImg.remove();
                    activeInitializationTimeSeriesImg = null;
                }
            }
        });

    function clearTimeSeriesContainer() {
        while (timeSeriesContainer.firstChild) {
            timeSeriesContainer.removeChild(timeSeriesContainer.firstChild);
        }
    }

    function createTimeSeriesCard(img, titleText, orderValue) {
        const card = document.createElement('div');
        card.style.border = '2px solid black';
        card.style.backgroundColor = 'white';
        card.style.display = 'inline-block';
        card.style.order = orderValue; 

        const header = document.createElement('div');
        header.innerText = titleText;
        header.style.backgroundColor = 'black';
        header.style.color = 'white';
        header.style.padding = '2px 8px';
        header.style.fontSize = '12px';
        header.style.fontFamily = 'Arial, sans-serif';
        header.style.fontWeight = 'bold';
        header.style.textAlign = 'left';

        img.style.display = 'block';
        img.style.margin = '0 auto';
        
        card.appendChild(header);
        card.appendChild(img);
        
        return card;
    }

    function createLegendCard(img, titleText, orderValue) {
        const card = document.createElement('div');
        card.style.border = '2px solid black';
        card.style.backgroundColor = 'white';
        card.style.display = 'inline-block';
        card.style.order = orderValue;

        const header = document.createElement('div');
        header.innerText = titleText;
        header.style.backgroundColor = 'black';
        header.style.color = 'white';
        header.style.padding = '2px 8px';
        header.style.fontSize = '12px';
        header.style.fontFamily = 'Arial, sans-serif';
        header.style.fontWeight = 'bold';
        header.style.textAlign = 'left';

        img.style.display = 'block';
        img.style.maxWidth = '150px';
        img.style.height = 'auto';

        card.appendChild(header);
        card.appendChild(img);

        return card;
    }

    function showWindNinjaTimeSeries(img) {
        if (!windninjaTimeSeriesEnabled || !img) return;
        if (activeWindNinjaTimeSeriesImg) activeWindNinjaTimeSeriesImg.remove();

        const card = createTimeSeriesCard(img, 'Simulation Datetime', 2);
        timeSeriesContainer.appendChild(card);
        activeWindNinjaTimeSeriesImg = card;
    }

    function showInitializationTimeSeries(img) {
        if (!initializationTimeSeriesEnabled || !img) return;
        if (activeInitializationTimeSeriesImg) activeInitializationTimeSeriesImg.remove();

        const card = createTimeSeriesCard(img, 'Weather Model Datetime', 1);
        timeSeriesContainer.appendChild(card);
        activeInitializationTimeSeriesImg = card;
    }


        // Script Main
        if (window.qt) {
            new QWebChannel(qt.webChannelTransport, channel => {
                window.bridge = channel.objects.bridge;
            });
        }
        
        map.addLayer(boundingBoxLayer);
        map.addLayer(demLayer);

        layerControl.addTo(map);
        L.control.scale().addTo(map);

    </script>
